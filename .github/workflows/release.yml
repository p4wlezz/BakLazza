name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      action:
        description: "Action"
        required: true
        default: "build"
        type: choice
        options:
          - build
          - bump
      bump_type:
        description: "Bump version type"
        required: false
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      bumped: ${{ steps.bump.outputs.bumped || 'false' }}
    steps:
      - name: Read version file
        id: version
        run: |
          VERSION=$(grep '^VERSION=' versions | cut -d'=' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Bump version
        id: bump
        if: github.event.inputs.action == 'bump'
        run: |
          CURRENT="${{ steps.version.outputs.version }}"
          BUMP="${{ github.event.inputs.bump_type }}"
          
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          
          case $BUMP in
            patch) PATCH=$((PATCH + 1)) ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
          esac
          
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "Bumping version: $CURRENT -> $NEW_VERSION"
          
          sed -i "s/^VERSION=.*/VERSION=$NEW_VERSION/" versions
          echo "bumped=true" >> $GITHUB_OUTPUT
      - name: Commit version bump
        if: github.event.inputs.action == 'bump'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add versions
          git commit -m "Bump version to ${{ steps.version.outputs.version }}" || echo "No bump"
          git push

  build:
    needs: check-version
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: baklazza-linux-x86_64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: baklazza-linux-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: baklazza-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: baklazza-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: baklazza-windows-x86_64
    steps:
      - name: Checkout source from private repo
        uses: actions/checkout@v4
        with:
          repository: p4wlezz/baklazza-src
          token: ${{ secrets.PAT }}
          path: src
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: ${{ matrix.target }}
      - name: Install cross-compiler
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - name: Build
        working-directory: src
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        working-directory: src
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz baklazza
      - name: Package (Windows)
        if: runner.os == 'Windows'
        working-directory: src
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/baklazza.exe" -DestinationPath "${{ matrix.artifact }}.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ runner.os == 'Windows' && 'zip' || 'tar.gz' }}

  create-release:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: baklazza-*
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.version }}
          name: v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
          files: |
            baklazza-linux-x86_64.tar.gz
            baklazza-linux-aarch64.tar.gz
            baklazza-macos-x86_64.tar.gz
            baklazza-macos-aarch64.tar.gz
            baklazza-windows-x86_64.zip

  sync-docs:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
- name: Sync docs to public repo
        uses: actions/checkout@v4
        with:
          path: public
      - name: Clone private repo for docs
        uses: actions/checkout@v4
        with:
          repository: p4wlezz/baklazza-src
          token: ${{ secrets.PAT }}
          path: private
      - name: Copy install scripts
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          
          # Copy scripts to release root
          cp private/install.sh public/
          cp private/install.ps1 public/
          
          # Copy docs
          cp private/README.md public/
          cp private/ROADMAP.md public/
          cp private/LICENSE public/
          cp private/CHANGELOG.md public/
          
          # Make scripts executable
          chmod +x public/install.sh
      - name: Commit and push
        run: |
          cd public
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Release v${{ needs.check-version.outputs.version }}" || echo "No changes"
          git push